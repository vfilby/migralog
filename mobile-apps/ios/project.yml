name: MigraLog
options:
  bundleIdPrefix: com.migralog
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  # Pinned exactly for reproducible builds — the resolved Package.resolved lives
  # inside the git-ignored xcodeproj, so floating `from:` ranges let CI drift
  # silently. Bumped weekly by .github/workflows/swift-deps-update.yml
  # (Dependabot's swift ecosystem can't read XcodeGen manifests).
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: "7.11.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    exactVersion: "9.17.1"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MigraLog:
    type: application
    platform: iOS
    sources:
      - path: MigraLog
    settings:
      base:
        INFOPLIST_FILE: MigraLog/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eff3.migralog
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "43DNX2P3T6"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Release:
          # Automatic signing (App Store Connect API key, -allowProvisioningUpdates
          # in release-pipeline.yml) so CI can manage profiles for both the app and
          # the MigraLogWidgets extension without a hand-maintained profile per
          # bundle id. Do NOT pin CODE_SIGN_IDENTITY here: with automatic signing
          # the archive action resolves the distribution identity itself, and a
          # pinned "Apple Distribution" conflicts with automatic ("conflicting
          # provisioning settings"). See #416.
          CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: GRDB
      - package: Sentry
      - target: MigraLogWidgets
    entitlements:
      path: MigraLog/App/MigraLog.entitlements
      properties:
        com.apple.developer.usernotifications.critical-alerts: true
        com.apple.developer.usernotifications.time-sensitive: true
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.eff3.migralog

  MigraLogWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: MigraLogWidgets
      # Shared ActivityKit contract — also compiled into the app target via its
      # MigraLog/ source root. Both targets must see the same types.
      - path: MigraLog/LiveActivity/Shared
    settings:
      base:
        INFOPLIST_FILE: MigraLogWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eff3.migralog.widgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "43DNX2P3T6"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: true
      configs:
        Release:
          CODE_SIGN_STYLE: Automatic
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  MigraLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MigraLogTests
    dependencies:
      - target: MigraLog
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MigraLog.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MigraLog"
        BUNDLE_LOADER: "$(TEST_HOST)"

  MigraLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MigraLogUITests
    dependencies:
      - target: MigraLog
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: MigraLog

schemes:
  MigraLog:
    build:
      targets:
        MigraLog: all
        MigraLogWidgets: all
        MigraLogTests: [test]
        MigraLogUITests: [test]
    test:
      # PR gate runs the Smoke plan (full unit suite + a tiny UI render subset).
      # The Full plan (entire suite minus screenshot capture) runs nightly.
      # See .github/workflows/swift-ci.yml and swift-nightly.yml.
      testPlans:
        - path: TestPlans/Smoke.xctestplan
          defaultPlan: true
        - path: TestPlans/Full.xctestplan
    run:
      config: Debug
    archive:
      config: Release
