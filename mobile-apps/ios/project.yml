name: MigraLog
options:
  bundleIdPrefix: com.migralog
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MigraLog:
    type: application
    platform: iOS
    sources:
      - path: MigraLog
    settings:
      base:
        INFOPLIST_FILE: MigraLog/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eff3.migralog
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "43DNX2P3T6"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "MigraLog App Store"
    dependencies:
      - package: GRDB
      - package: Sentry
    entitlements:
      path: MigraLog/App/MigraLog.entitlements
      properties:
        com.apple.developer.usernotifications.time-sensitive: true

  MigraLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MigraLogTests
    dependencies:
      - target: MigraLog
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MigraLog.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MigraLog"
        BUNDLE_LOADER: "$(TEST_HOST)"

  MigraLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MigraLogUITests
    dependencies:
      - target: MigraLog
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: MigraLog
