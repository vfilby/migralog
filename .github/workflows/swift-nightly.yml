name: '[iOS] Nightly UI suite'

# The full UI test suite is slow (~tens of minutes) and has known
# order-dependent flakes, so it is kept OUT of the PR gate. The PR gate runs the
# Smoke test plan (unit + render checks); this workflow runs the Full test plan
# nightly against main. Failures open/append a tracking issue so a red nightly
# is never silently ignored.

on:
  schedule:
    # 09:17 UTC daily. Off-peak and an odd minute — GitHub delays/drops cron at
    # the top of the hour under load, so avoid :00.
    - cron: '17 9 * * *'
  workflow_dispatch: {}

# A manual run during a scheduled one (or vice versa) shouldn't pile up macOS
# jobs against the concurrency cap.
concurrency:
  group: ios-nightly
  cancel-in-progress: true

jobs:
  full-ui-suite:
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      contents: read
      issues: write
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
        working-directory: mobile-apps/ios

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          INSTALLED=$(xcodegen --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          MINIMUM="2.45.3"
          if [ "$(printf '%s\n' "$MINIMUM" "$INSTALLED" | sort -V | head -n1)" != "$MINIMUM" ]; then
            echo "::error::XcodeGen version too old: need >= $MINIMUM, got $INSTALLED"
            exit 1
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -scheme MigraLog -project MigraLog.xcodeproj

      # Full test plan: entire unit + UI suite (minus screenshot capture). No
      # -retry-tests-on-failure — flakes should surface and be fixed, not be
      # masked by auto-retry.
      - name: Run full suite (-testPlan Full)
        run: |
          xcodebuild test \
            -scheme MigraLog \
            -project MigraLog.xcodeproj \
            -testPlan Full \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nightly-test-results
          path: mobile-apps/ios/TestResults.xcresult
          retention-days: 14

      # A non-gating nightly is worthless if a red run goes unnoticed. On
      # failure, open a tracking issue (or append to the existing open one so we
      # don't spam a new issue every night).
      - name: Open/append failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'nightly-failure';
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Nightly Full UI suite failed on \`${sha}\`.\n\n[View run](${runUrl})`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Nightly UI suite failing',
                labels: [label],
                body,
              });
            }
