name: '[Web] Deploy Staging'

# Auto-deploys staging.migralog.app on every push to main that touches the
# website. Authenticates to the Migralog AWS account (483643755230) via GitHub
# OIDC — no stored AWS keys. The assumed role is trust-scoped to this repo's
# main branch (see website/infrastructure/lib/github-oidc-stack.ts).

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website-staging.yml'
  workflow_dispatch:

concurrency:
  group: website-staging
  cancel-in-progress: false

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

jobs:
  deploy:
    name: Deploy staging.migralog.app
    runs-on: ubuntu-latest
    env:
      HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::483643755230:role/migralog-website-deploy-staging
          aws-region: us-east-1

      - name: Deploy staging
        working-directory: website
        run: ./deploy-website.sh staging --force
