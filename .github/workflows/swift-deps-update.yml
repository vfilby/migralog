name: '[iOS] Swift package updates'

# Dependabot can't manage the iOS app's Swift packages: its swift ecosystem
# only reads SPM manifests (Package.swift / Package.resolved), and this repo
# declares packages in mobile-apps/ios/project.yml (XcodeGen) with the
# generated xcodeproj git-ignored. This workflow fills the gap: weekly, check
# each pinned package against its latest GitHub release and open a bump PR.
#
# NOTE: PRs created with the default GITHUB_TOKEN do not trigger other
# workflows, so the iOS CI gate won't run automatically on the bump PR.
# Close & reopen the PR (or push any commit to its branch) to run CI.

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC, same cadence as dependabot.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for package updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node .github/scripts/swift-deps-check.mjs --write > /tmp/updates.json
          cat /tmp/updates.json
          echo "count=$(jq '.updates | length' /tmp/updates.json)" >> "$GITHUB_OUTPUT"

      - name: Open or update bump PR
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=automated/swift-deps-update
          TITLE="chore(deps): $(jq -r '[.updates[] | "bump \(.name) from \(.from) to \(.to)"] | join(", ")' /tmp/updates.json)"

          {
            echo "Weekly Swift package check against GitHub releases."
            echo
            echo "| Package | From | To | Release notes |"
            echo "| --- | --- | --- | --- |"
            jq -r '.updates[] | "| \(.name)\(if .major then " ⚠️ **major**" else "" end) | \(.from) | \(.to) | [\(.toTag)](\(.url)/releases/tag/\(.toTag)) |"' /tmp/updates.json
            echo
            echo "> [!NOTE]"
            echo "> This PR was opened with the default \`GITHUB_TOKEN\`, which cannot trigger"
            echo "> the iOS CI gate. **Close and reopen this PR** (or push to the branch) to run CI."
            echo
            echo "Generated by \`.github/workflows/swift-deps-update.yml\`."
          } > /tmp/body.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add mobile-apps/ios/project.yml
          git commit -m "$TITLE"
          git push -f origin "$BRANCH"

          gh label create dependencies --description "Dependency updates" --color 0366d6 2>/dev/null || true
          gh label create automated --description "Opened by automation" --color ededed 2>/dev/null || true

          if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq length)" = "0" ]; then
            gh pr create --head "$BRANCH" --title "$TITLE" --body-file /tmp/body.md \
              --label dependencies --label automated
          else
            gh pr edit "$BRANCH" --title "$TITLE" --body-file /tmp/body.md
          fi
