name: '[Web] Deploy Production'

# Manual, gated deploy of migralog.app from the committed website/ content.
# Uses the GitHub `production` Environment as the approval gate, and OIDC into
# the Migralog AWS account (483643755230). The assumed role is trust-scoped to
# `environment:production`, so it can only be assumed from a job bound to that
# environment (see website/infrastructure/lib/github-oidc-stack.ts).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm a production deploy"
        required: true
        type: string

concurrency:
  group: website-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy migralog.app
    runs-on: ubuntu-latest
    environment: production
    env:
      HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "::error::You must type 'deploy' to confirm a production deploy." >&2
          exit 1

      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::483643755230:role/migralog-website-deploy-production
          aws-region: us-east-1

      - name: Deploy production
        working-directory: website
        run: ./deploy-website.sh production --force
