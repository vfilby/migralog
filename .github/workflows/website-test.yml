name: '[Web] Test'

# Reusable Playwright suite. Two modes:
#   - base_url set    -> test the live, deployed site (deploy pipeline smoke).
#   - base_url empty  -> serve website/ locally and test it (PR CI gate).
# Visual-regression specs are excluded (platform-specific snapshots, wrong fit
# for a deploy gate) via `npm run test:ci`.

on:
  workflow_call:
    inputs:
      base_url:
        description: 'Live base URL to test against. Empty => serve locally.'
        required: false
        type: string
        default: ''
      environment_name:
        description: 'Label for logs/artifacts (staging | production | pr)'
        required: false
        type: string
        default: local

jobs:
  playwright:
    name: Playwright (${{ inputs.environment_name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Wait for site to respond
        if: ${{ inputs.base_url != '' }}
        run: |
          echo "Waiting for ${{ inputs.base_url }} to return HTTP 200..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "${{ inputs.base_url }}/" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Site is up (HTTP 200)."
              exit 0
            fi
            echo "Attempt $i: HTTP $code — retrying in 5s"
            sleep 5
          done
          echo "::error::${{ inputs.base_url }} did not return HTTP 200 in time" >&2
          exit 1

      - name: Run Playwright tests
        env:
          CI: 'true'
          # Empty => Playwright config falls back to the local static server.
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
        run: npm run test:ci

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.environment_name }}
          path: website/playwright-report/
          retention-days: 14
