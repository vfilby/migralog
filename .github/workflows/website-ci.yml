name: '[Web] CI'

# Pre-merge gate for website changes: runs the Playwright functional suite
# against a locally-served copy of website/ on every PR that touches it. This
# is what keeps the suite honest — the tests previously drifted out of sync
# with the site because nothing ran them before merge. The live-site smoke
# runs happen later, in the deploy pipeline (website-deploy.yml).

on:
  pull_request:
    paths:
      - 'website/**'
      - '.github/workflows/website-ci.yml'
      - '.github/workflows/website-test.yml'

jobs:
  test:
    name: Test (local)
    # No base_url => website-test.yml serves website/ locally and tests it.
    uses: ./.github/workflows/website-test.yml
    with:
      environment_name: pr
