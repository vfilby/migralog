name: '[Web] Refresh screenshots'

# Regenerates the website's app screenshots from the current iOS app.
# Builds the app, runs the ScreenshotsUITests marketing capture in light and
# dark appearance, and opens a PR if the images changed. Manual trigger —
# run it whenever the app UI has drifted from what the website shows.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Capture & PR
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate screenshots
        env:
          DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
          SCREENSHOT_DEVICE: iPhone 17 Pro Max
        run: ./scripts/generate-website-screenshots.sh

      - name: Open PR if screenshots changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- website/website/screenshots; then
            echo "Screenshots are unchanged — nothing to do."
            exit 0
          fi
          BRANCH="chore/refresh-website-screenshots-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add website/website/screenshots
          git commit -m "chore(website): refresh app screenshots from current build"
          git push -u origin "$BRANCH" --force
          gh pr create --fill --base main --head "$BRANCH" \
            --title "chore(website): refresh app screenshots" \
            --body "Automated screenshot refresh from \`ScreenshotsUITests\` (light + dark). Review the images, then merge." \
            || echo "PR already exists for $BRANCH"
