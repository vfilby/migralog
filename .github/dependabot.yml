version: 2
updates:
  # Enable GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
      - "automated"

  # NOTE: no `swift` entry — Dependabot's swift ecosystem only reads SPM
  # manifests (Package.swift / Package.resolved). The iOS app declares its
  # packages in mobile-apps/ios/project.yml (XcodeGen) and the generated
  # xcodeproj is git-ignored, so a swift entry here silently does nothing.
  # Swift package bumps are handled by .github/workflows/swift-deps-update.yml.
